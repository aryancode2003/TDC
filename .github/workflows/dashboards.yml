name: Dashboards CI/CD

on:
  push:
    branches: ['main', 'develop']
    paths:
      - 'apps/admin-dashboard/**'
      - 'apps/partner-dashboard/**'
      - '.github/workflows/dashboards.yml'
  pull_request:
    branches: ['main', 'develop']
    paths:
      - 'apps/admin-dashboard/**'
      - 'apps/partner-dashboard/**'

jobs:
  build-admin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --workspace=@tdc/admin-dashboard

      - name: Type check
        run: npm run type-check --workspace=@tdc/admin-dashboard

      - name: Build application
        run: npm run build --workspace=@tdc/admin-dashboard

  build-partner:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --workspace=@tdc/partner-dashboard

      - name: Type check
        run: npm run type-check --workspace=@tdc/partner-dashboard

      - name: Build application
        run: npm run build --workspace=@tdc/partner-dashboard
