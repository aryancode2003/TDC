apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdc-partner-dashboard
  namespace: default
  labels:
    app: tdc-partner-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tdc-partner-dashboard
  template:
    metadata:
      labels:
        app: tdc-partner-dashboard
    spec:
      containers:
        - name: partner-dashboard
          image: tdc-partner-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://tdc-backend:3000"
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: tdc-partner-dashboard
  namespace: default
spec:
  selector:
    app: tdc-partner-dashboard
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3000
  type: ClusterIP
