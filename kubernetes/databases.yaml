apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdc-postgres
  namespace: default
  labels:
    app: tdc-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tdc-postgres
  template:
    metadata:
      labels:
        app: tdc-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "tdc"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: tdc-secrets
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tdc-secrets
                  key: DB_PASSWORD
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tdc-postgres
  namespace: default
spec:
  selector:
    app: tdc-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdc-redis
  namespace: default
  labels:
    app: tdc-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tdc-redis
  template:
    metadata:
      labels:
        app: tdc-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: tdc-redis
  namespace: default
spec:
  selector:
    app: tdc-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meilisearch-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdc-meilisearch
  namespace: default
  labels:
    app: tdc-meilisearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tdc-meilisearch
  template:
    metadata:
      labels:
        app: tdc-meilisearch
    spec:
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.7
          ports:
            - containerPort: 7700
          env:
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: tdc-secrets
                  key: MEILISEARCH_API_KEY
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: meilisearch-storage
              mountPath: /data.ms
      volumes:
        - name: meilisearch-storage
          persistentVolumeClaim:
            claimName: meilisearch-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tdc-meilisearch
  namespace: default
spec:
  selector:
    app: tdc-meilisearch
  ports:
    - protocol: TCP
      port: 7700
      targetPort: 7700
  type: ClusterIP
