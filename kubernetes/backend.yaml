apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdc-backend
  namespace: default
  labels:
    app: tdc-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tdc-backend
  template:
    metadata:
      labels:
        app: tdc-backend
    spec:
      containers:
        - name: backend
          image: tdc-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: tdc-config
            - secretRef:
                name: tdc-secrets
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: tdc-backend
  namespace: default
spec:
  selector:
    app: tdc-backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
